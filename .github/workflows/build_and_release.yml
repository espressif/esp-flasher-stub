---
name: Build and release

on: [push, pull_request, workflow_dispatch]

jobs:
  build_stubs:
    runs-on: ubuntu-24.04
    # Collapse concurrent master workflow_dispatch builds: if a new dispatch
    # arrives while one is running, the in-progress run is cancelled and the
    # new one takes over.  PRs watching the cancelled run will hit the retry
    # path and pick up the latest successful master artifacts.
    # Other events (push, PR) get a unique group and are never cancelled.
    concurrency:
      group: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && 'build-stubs-master-dispatch' || format('build-stubs-{0}', github.run_id) }}
      cancel-in-progress: true

    steps:
      - name: Checkout ref commit
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyelftools

      - name: Install toolchains
        shell: bash
        run: |
          mkdir -p toolchains
          pushd toolchains
          ../tools/setup_toolchains.sh
          popd

      - name: Build stub
        shell: bash
        run: |
          source ./tools/export_toolchains.sh
          ./tools/build_all_chips.sh

      - name: Upload stub JSONs
        uses: actions/upload-artifact@v4
        with:
          name: stub-jsons
          path: |
            build*/esp*.json
            !build*/*.base.json
          if-no-files-found: error
          retention-days: 3

  generate_npm_package:
    needs: build_stubs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full checkout to get tags

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download stub JSONs
        uses: actions/download-artifact@v8
        with:
          name: stub-jsons
          path: stub-jsons

      - name: Generate package version
        id: get_version
        shell: bash
        # vX.Y.Z tag -> X.Y.Z
        # vX.Y.Z-N-g<hash> describe -> X.Y.Z-N-g<hash>
        # otherwise -> 0.0.0-<short-sha>
        run: |
          DESCRIBE=$(git describe --tags --always 2>/dev/null || true)
          if [[ "$DESCRIBE" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            COMMIT_ID=$(git rev-parse --short HEAD)
            VERSION="0.0.0-${COMMIT_ID}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate npm package
        run: |
          node tools/generate_npm_package.mjs \
            --version "${{ steps.get_version.outputs.VERSION }}" \
            --stub-dir stub-jsons \
            --out-dir npm-package
          cd npm-package
          npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: npm-package/*.tgz

  size_report:
    name: Stub Size Report
    needs: build_stubs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      # Fork PRs run with a read-only GITHUB_TOKEN, so this job does not post
      # the comment itself: it uploads the report as an artifact, and the
      # size_report_comment.yml (workflow_run) receiver posts it with a write
      # token in base-repo context.  Only actions:write is still needed here,
      # to download / trigger a master build for the comparison — this works
      # for same-repo PRs and degrades gracefully to a PR-only report on forks.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download PR artifacts
        uses: actions/download-artifact@v4
        with:
          name: stub-jsons
          path: pr-artifacts

      - name: Download master artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: build_and_release.yml
        run: |
          REPO="${{ github.repository }}"

          download_artifacts() {
            local run_id="$1"
            if gh run download "$run_id" \
              --repo "$REPO" --name stub-jsons \
              --dir master-artifacts 2>/dev/null; then
              echo "Downloaded master artifacts from run $run_id (stub-jsons)"
              return 0
            elif gh run download "$run_id" \
              --repo "$REPO" --name artifact \
              --dir master-artifacts 2>/dev/null; then
              echo "Downloaded master artifacts from run $run_id (artifact)"
              return 0
            fi
            return 1
          }

          # Try the latest successful master build
          RUN_ID=$(gh run list \
            --repo "$REPO" \
            --workflow "$WORKFLOW" \
            --branch master \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)

          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            if download_artifacts "$RUN_ID"; then
              exit 0
            fi
            echo "Artifacts from run $RUN_ID have expired"
          fi

          # No downloadable artifacts — trigger a fresh master build.
          # Note: for fork PRs, GITHUB_TOKEN is read-only so gh workflow run
          # will fail here; the fallback below handles it gracefully.
          echo "Triggering a fresh master build to generate artifacts..."
          # 10 s margin absorbs runner-vs-GitHub clock skew so the
          # createdAt filter never misses the just-dispatched run.
          START_TS=$(date -u -d '-10 seconds' +%FT%TZ)
          if ! gh workflow run "$WORKFLOW" \
            --repo "$REPO" --ref master; then
            echo "::notice::Unable to trigger a master build; skipping comparison"
            exit 0
          fi

          # Poll until a run created after our dispatch appears (up to 120 s).
          # Multiple concurrent PRs may each find the same run; the
          # concurrency group (cancel-in-progress: true) ensures only the
          # latest dispatch actually completes — PRs watching a cancelled
          # run fall through to the retry path below.
          echo "Waiting for the triggered build to appear..."
          sleep 2  # let the API index the new run before polling
          NEW_RUN_ID=""
          for _ in $(seq 1 24); do
            sleep 5
            NEW_RUN_ID=$(gh run list \
              --repo "$REPO" \
              --workflow "$WORKFLOW" \
              --branch master \
              --event workflow_dispatch \
              --limit 5 \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$START_TS\")] | .[0].databaseId" 2>/dev/null || true)
            if [ -n "$NEW_RUN_ID" ] && [ "$NEW_RUN_ID" != "null" ]; then
              break
            fi
          done

          if [ -z "$NEW_RUN_ID" ] || [ "$NEW_RUN_ID" = "null" ]; then
            echo "::notice::Triggered master build did not appear; skipping comparison"
            exit 0
          fi

          echo "Waiting for master build $NEW_RUN_ID to complete..."
          # 20 min cap: build_stubs typically finishes in ~2–3 min (toolchain
          # install + 10–16 s build); the generous margin covers slow runners.
          if ! timeout 1200 gh run watch "$NEW_RUN_ID" \
            --repo "$REPO" --exit-status; then
            # The build may have been cancelled by the concurrency group
            # (superseded by a newer dispatch).  Re-check whether a
            # successful master build now exists before giving up.
            echo "Build $NEW_RUN_ID did not succeed — checking for a recent successful master build..."
            RETRY_ID=$(gh run list \
              --repo "$REPO" \
              --workflow "$WORKFLOW" \
              --branch master \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || true)
            if [ -n "$RETRY_ID" ] && [ "$RETRY_ID" != "null" ] && download_artifacts "$RETRY_ID"; then
              exit 0
            fi
            echo "::warning::Triggered master build $NEW_RUN_ID did not succeed or timed out; skipping comparison"
            exit 0
          fi

          if download_artifacts "$NEW_RUN_ID"; then
            exit 0
          fi

          echo "::notice::Could not obtain master artifacts; skipping comparison"

      - name: Generate size report
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p size-report
          if [ -d master-artifacts ]; then
            REPORT=$(python tools/compare_sizes.py \
              --master-dir master-artifacts \
              --pr-dir pr-artifacts)
          else
            REPORT=$(python tools/compare_sizes.py \
              --pr-dir pr-artifacts)
          fi

          # First line is the marker used to find/update the comment later.
          MARKER='<!-- stub-size-report -->'
          {
            printf '%s\n' "$MARKER"
            printf '%s\n' "$REPORT"
          } > size-report/report.md

          # Record the PR number for the workflow_run receiver: for fork PRs the
          # workflow_run event payload does not carry the PR, so we pass it along
          # here.  The receiver treats it as untrusted and validates it against
          # the built commit before commenting.
          printf '%s\n' "$PR_NUMBER" > size-report/pr-number

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report/
          if-no-files-found: error
          retention-days: 3

  create_release:
    name: Create GitHub release
    needs: build_stubs
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install commitizen czespressif
      - name: Generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md
      - name: Download stub JSONs
        uses: actions/download-artifact@v4
        with:
          name: stub-jsons
          path: stub-jsons
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: stub-jsons/**/esp*.json
