---
name: Build and release

on: [push, pull_request]

jobs:
  build_stubs:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout ref commit
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyelftools

      - name: Install toolchains
        shell: bash
        run: |
          mkdir -p toolchains
          pushd toolchains
          ../tools/setup_toolchains.sh
          popd

      - name: Build stub
        shell: bash
        run: |
          source ./tools/export_toolchains.sh
          ./tools/build_all_chips.sh

      - name: Upload stub JSONs
        uses: actions/upload-artifact@v4
        with:
          name: stub-jsons
          path: |
            build*/esp*.json
            !build*/*.base.json
          if-no-files-found: error
          retention-days: 3

  size_report:
    name: Stub Size Report
    needs: build_stubs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download PR artifacts
        uses: actions/download-artifact@v4
        with:
          name: stub-jsons
          path: pr-artifacts

      - name: Download master artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the latest successful build on master from this same workflow
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow build_and_release.yml \
            --branch master \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            # Must match upload-artifact name: stub-jsons or artifact
            if gh run download "$RUN_ID" \
              --repo "${{ github.repository }}" \
              --name stub-jsons \
              --dir master-artifacts 2>/dev/null; then
              echo "Downloaded master artifacts from run $RUN_ID (stub-jsons)"
            elif gh run download "$RUN_ID" \
              --repo "${{ github.repository }}" \
              --name artifact \
              --dir master-artifacts 2>/dev/null; then
              echo "Downloaded master artifacts from run $RUN_ID (artifact)"
            else
              echo "::notice::Run $RUN_ID has no stub-jsons/artifact download; skipping master comparison"
            fi
          else
            echo "::notice::No successful master build found for comparison"
          fi

      - name: Generate and post size report
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -d master-artifacts ]; then
            REPORT=$(python tools/compare_sizes.py \
              --master-dir master-artifacts \
              --pr-dir pr-artifacts)
          else
            REPORT=$(python tools/compare_sizes.py \
              --pr-dir pr-artifacts)
          fi

          MARKER='<!-- stub-size-report -->'
          BODY="${MARKER}"$'\n'"${REPORT}"

          # Find existing size-report comment (if any)
          COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -n1)

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH --field body="$BODY"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi

  create_release:
    name: Create GitHub release
    needs: build_stubs
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install commitizen czespressif
      - name: Generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md
      - name: Download stub JSONs
        uses: actions/download-artifact@v4
        with:
          name: stub-jsons
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: stub-jsons/build*/esp*.json
